[env:nodemcu-32s]
platform = espressif32
board = nodemcu-32s
framework = arduino
lib_deps = 
	adafruit/Adafruit Unified Sensor@^1.1.15
	adafruit/Adafruit MPU6050@^2.2.9
	adafruit/MAX6675 library@^1.1.2
	knolleary/PubSubClient@^2.8
	asukiaaa/MPU9250_asukiaaa@^1.5.13
